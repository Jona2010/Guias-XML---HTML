<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lector de Guías SUNAT | Sistema Profesional</title>

<!-- 🔥 FAVICON -->
<link rel="icon" href="Logo_XML_HTML.png" type="image/png">

<meta name="description" content="Sistema profesional para visualizar y exportar guías de remisión SUNAT XML a Excel y PDF.">
<meta name="keywords" content="SUNAT, guía remisión, XML, exportar Excel, Perú">

<link rel="stylesheet" href="styles.css">

<!-- ICONOS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Excel -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js" defer></script>

</head>

<body>

<!-- HEADER -->
<header class="header">
    <img src="Logo_XML.png" alt="Logo" class="logo">
    <span>Sistema de Guías de Remisión SUNAT</span>
</header>

<div class="container">

    <div class="main-layout">

        <!-- 🔹 HISTORIAL (40%) -->
        <aside class="card historial-panel">

            <h3><i class="fa-solid fa-folder"></i> Historial</h3>

            <!-- BUSCADOR -->
            <div class="buscador-wrapper">
                <input
                    id="buscador"
                    type="text"
                    placeholder="Buscar por número de guía o item..."
                    autocomplete="off"
                >
                <button
                    id="btn-limpiar"
                    onclick="limpiarBusqueda()"
                    title="Limpiar búsqueda"
                >✖</button>
            </div>

            <!-- HISTORIAL -->
            <div id="historial-lista"></div>

            <!-- RESULTADOS BÚSQUEDA -->
            <div id="historial-busqueda" style="display:none;"></div>

        </aside>


        <!-- 🔹 VISTA GUÍA (60%) -->
        <section class="guia-panel">

            <!-- CARGA XML -->
            <div class="card-top">
                <label><strong>Seleccionar XML:</strong></label>
                <input type="file" id="xmlfile" accept=".xml">
                <button class="btn btn-primary" onclick="leerGuia()">📤 Procesar</button>
            </div>

            <!-- EXPORTACIONES -->
            <div class="export-buttons">
                <button class="btn btn-excel" onclick="exportarExcel()">📊 Excel</button>
                <button class="btn btn-pdf" onclick="exportarPDF()">📄 PDF</button>
            </div>

            <!-- VISOR -->
            <div class="card">
                <h2><i class="fa-solid fa-file"></i> Vista de Guía</h2>
                <div id="pdf-area">
                    <div id="salida"></div>
                </div>
            </div>

        </section>

    </div>

</div>

<!-- SEO JSON-LD -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Sistema de Guías SUNAT",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web"
}
</script>

</body>
</html>
